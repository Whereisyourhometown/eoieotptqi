<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>退不出去</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  position: fixed;
  top: 0;
  left: 0;
  background: #000;
  touch-action: none;
}
#scareImg {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  display: block;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}
#pwdBox {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #fff;
  border: 5px solid red;
  padding: 30px 20px;
  text-align: center;
  z-index: 99999;
  width: 90%;
  max-width: 320px;
}
#pwdBox h3 {
  font-size: 18px;
  margin-bottom: 15px;
}
#pwdInput {
  width: 100%;
  height: 45px;
  font-size: 18px;
  padding: 0 10px;
  border: 2px solid #333;
  margin-bottom: 15px;
  display: block;
}
#confirmBtn {
  padding: 10px 25px;
  font-size: 18px;
  cursor: pointer;
}
#tipText {
  color: red;
  font-size: 16px;
  margin-top: 10px;
}
#countPage {
  width: 100vw;
  height: 100vh;
  background: #000;
  color: red;
  font-size: 150px;
  display: none;
  justify-content: center;
  align-items: center;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 99998;
}
</style>
</head>
<body>
<img id="scareImg" src="恐怖.jpg">

<audio id="audio" autoplay>
  <source src="女鬼.mp3" type="audio/mpeg">


<div id="pwdBox">
  <h3>请输入密码才能退出</h3>
  <input type="text" id="pwdInput" placeholder="输入密码">
  <button id="confirmBtn">确认</button>
  <div id="tipText"></div>
</div>

<div id="countPage">30</div>

<script>
// 禁止滑动
document.addEventListener('touchmove', function(e){
  e.preventDefault();
  e.stopPropagation();
}, { passive: false });

document.addEventListener('touchstart', function(e){
}, { passive: false });

// 禁止返回
history.pushState(null, null, location.href);
window.onpopstate = function(){
  history.go(1);
};

window.onbeforeunload = function(){
  return "退不出去！";
};

const audio = document.getElementById('audio');
const pwdBox = document.getElementById('pwdBox');
const pwdInput = document.getElementById('pwdInput');
const confirmBtn = document.getElementById('confirmBtn');
const tipText = document.getElementById('tipText');
const countPage = document.getElementById('countPage');

let count = 30;

// 播放27秒停止
setTimeout(function(){
  audio.pause();
  audio.currentTime = 0;
}, 27000);

// 密码验证
confirmBtn.onclick = function(){
  let val = pwdInput.value.trim();
  if(val == "老家在哪里"){
    window.close();
  }else{
    tipText.innerText = "密码错误！";
    pwdBox.style.display = "none";
    countPage.style.display = "flex";
    startCount();
  }
};

// 倒计时
function startCount(){
  let timer = setInterval(function(){
    count--;
    countPage.innerText = count;
    if(count <= 0){
      clearInterval(timer);
      window.close();
    }
  }, 1000);
}
</script>
</body>
</html>
